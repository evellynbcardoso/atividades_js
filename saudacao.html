<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudação do usuario </title>
</head>
<body>
    <script>
        function cumprimeitarUsuario(nome){
            return "Olá, " + nome + "!";
        }
        let nomeUsuario = prompt("Qual o seu nome? ");
        let saudacao = cumprimeitarUsuario(nomeUsuario);

        document.write(saudacao)
    </script>
</body>
</html>
